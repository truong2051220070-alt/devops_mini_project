version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: devops-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: devops-mini
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - devops-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devops-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_URL: mongodb://admin:password@mongo:27017/devops-mini?authSource=admin
      APP_NAME: "DevOps Mini Project API"
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - devops-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: devops-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  devops-network:
    driver: bridge
